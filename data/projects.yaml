# Research-theme projects. Cross-links resolve to:
#   Software cards: /software/#<packageName>
#   Workflow cards: /workflows/#<slug>

# TODO: Add a project hero image / illustration once available.
- name: "Single-Cell Analysis"
  slug: single-cell-analysis
  weight: 10
  description: "<em>Cellular composition and state in injured and healthy tissue.</em> CTIR develops methods and software for end-to-end single-cell analysis — from raw counts through QC, embedding, segmentation-aware spatial context, and publication-ready cell-level reporting."
  software:
    - { pkg: cellreportR, note: "publication-ready cell-level reports" }
    - { pkg: scimagR,     note: "single-cell imaging integration" }
    - { pkg: segmantR,    note: "segmentation utilities" }
    - { pkg: bambamR,     note: "bulk reference profiles for calibration" }
    - { pkg: songR,       note: "interpretable embeddings" }
  workflows:
    - { slug: single-cell-tissue-atlas,      title: "Single-Cell Tissue Atlas" }
    - { slug: multimodal-tissue-integration, title: "Multi-Modal Tissue Integration", note: "(includes single-cell)" }

# TODO: Add a project hero image / illustration once available.
- name: "Hyperspectral Imaging"
  slug: hsi
  weight: 20
  description: "<em>Label-free tissue characterization from spectral signatures.</em> CTIR develops HSI ingest, preprocessing, library matching, and interpretable embedding methods for tissue-region classification, with reproducible reporting baked in."
  software:
    - { pkg: hyperspectR, note: "HSI cube ingest and preprocessing" }
    - { pkg: libscanR,    note: "reference-spectrum library matching" }
    - { pkg: songR,       note: "interpretable embeddings over spectral features" }
    - { pkg: reflowR,     note: "CTIR-styled reproducible report themes" }
  workflows:
    - { slug: hsi-tissue-characterization,   title: "Hyperspectral Tissue Characterization" }
    - { slug: multimodal-tissue-integration, title: "Multi-Modal Tissue Integration", note: "(includes HSI)" }

# TODO: Add a project hero image / illustration once available.
- name: "Cross-Modal Integration"
  slug: cross-modal-integration
  weight: 30
  description: "<em>Aligning high-dimensional modalities — imaging, single-cell, bulk omics, multiplex protein, molecular pathology — into a coherent translational view.</em> CTIR's flagship integration theme: methods and software for harmonizing heterogeneous data into shared representations, with cohort-level inference and interactive exploration. Connects assay-level processing to translational inference end-to-end."
  software:
    - { pkg: hyperspectR, note: "modality-specific ingest and processing" }
    - { pkg: cellreportR, note: "cell-level reporting" }
    - { pkg: bambamR,     note: "bulk RNA-seq processing" }
    - { pkg: segmantR,    note: "segmentation utilities" }
    - { pkg: scimagR,     note: "single-cell imaging integration" }
    - { pkg: qviewparsR,  note: "multiplex protein parsing" }
    - { pkg: pressR,      note: "cohort reporting" }
    - { pkg: molpathR,    note: "molecular pathology cohort assembly and interactive exploration" }
    - { pkg: songR,       note: "joint interpretable embeddings across modalities" }
    - { pkg: dynasimR,    note: "synthetic ground truth for integration benchmarking" }
  workflows:
    - { slug: multimodal-tissue-integration, title: "Multi-Modal Tissue Integration", note: "(flagship)" }
    - { slug: multiplex-protein-cohort,      title: "Multiplex Protein Quantification & Cohort Analysis" }
    - { slug: molecular-pathology-cohort,    title: "Molecular Pathology Cohort" }
    - { slug: bulk-transcriptomic-response,  title: "Bulk Transcriptomic Response" }

# TODO: Add a project hero image / illustration once available.
- name: "Basic Bioinformatics"
  slug: basic-bioinformatics
  weight: 40
  description: "<em>Foundational methods, benchmarking, and reproducibility infrastructure.</em> The methodological backbone of CTIR's applied work: interpretable dimensionality reduction, RNA-seq fundamentals, simulation-based benchmarking, and reproducible reporting templates that the applied projects build on."
  software:
    - { pkg: songR,    note: "SONG dimensionality reduction" }
    - { pkg: bambamR,  note: "RNA-seq pipeline fundamentals" }
    - { pkg: dynasimR, note: "synthetic ground-truth simulation" }
    - { pkg: reflowR,  note: "reproducible report themes" }
    - { pkg: hexmakR,  note: "package branding utilities" }
  workflows:
    - { slug: bulk-transcriptomic-response, title: "Bulk Transcriptomic Response" }
    - { slug: method-benchmarking,          title: "Method Benchmarking on Synthetic Ground Truth" }
    - { slug: ctir-site-template,           title: "Templating a CTIR-Styled Reproducible Site" }
