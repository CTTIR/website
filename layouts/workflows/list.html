{{ define "content" }}
<section class="container page">
  <article>
    <header><h1 class="title"><span class="title-text">{{ .Title }}</span></h1></header>
    {{ .Content }}

    {{ partial "tile-grid.html" (dict "items" (sort .Site.Data.workflows "weight" "asc") "kind" "workflow") }}
  </article>
</section>
{{ end }}
